name: Java Selenium CI

# This triggers the pipeline on every push or pull request to the 'main' branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # We use Ubuntu because it comes with Chrome and Maven pre-installed
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the Java environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Execute the tests using Maven
      - name: Run Selenium Tests
        run: mvn test
        # This will look for your testng.xml defined in the pom.xml

      # 4. Save the TestNG reports so you can download them later
      - name: Upload Test Results
        if: always() # Run this even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/